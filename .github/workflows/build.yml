name: Build PolicePartner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore PolicePartner.csproj

      - name: Build
        run: msbuild PolicePartner.csproj /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: PolicePartner
          path: bin\x64\Release\net48\PolicePartner.dll
