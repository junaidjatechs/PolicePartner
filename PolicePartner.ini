[Keys]
; Key to open the Police Partner menu (default: F6)
MenuKey=F6
; Key to force partner to follow / regroup with player (default: Y)
FollowKey=Y

[Settings]
; Distance (metres) ahead of player where partner spawns
SpawnDistance=3.0
; Give partner a weapon automatically on spawn
AutoEquipWeapon=true
; Weapon to give (standard GTA weapon hash names)
DefaultWeapon=WEAPON_PISTOL
